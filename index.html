<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodrigo & Laura</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

.hidden {
    display: none;
}

#welcome-screen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
}

.card {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    background: rgba(0,0,0,0.8);
}

.title {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
}

button {
    margin-top: 20px;
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    background: #f97316;
    color: white;
    cursor: pointer;
}

#main {
    position: relative;
    min-height: 100vh;
}

#bg {
    position: fixed;
    inset: 0;
    background: url('imagen.jpeg') center/cover no-repeat;
    z-index: -1;
}

#content {
    padding: 40px;
    text-align: center;
}

iframe {
    width: 100%;
    height: 300px;
    border: none;
    border-radius: 12px;
}

#mute-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.6);
    padding: 10px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div id="welcome-screen">
    <div class="card">
        <div class="title">Rodrigo y Laura</div>
        <p>Tocá para abrir la invitación</p>
        <button onclick="openInvitation()">ABRIR INVITACIÓN</button>
    </div>
</div>

<div id="main">

<div id="bg"></div>

<div id="mute-btn" onclick="toggleMute()">
    <i id="mute-icon" data-lucide="volume-2"></i>
</div>

<div id="content" class="hidden">

<h1 class="title">Nos casamos</h1>

<p>Te esperamos para celebrar con nosotros</p>

<h2>Ubicación</h2>

<iframe src="https://www.google.com/maps?q=cordoba&output=embed"></iframe>

</div>

</div>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
let isMuted = false;
let started = false;

function openInvitation() {
    const welcome = document.getElementById('welcome-screen');
    const content = document.getElementById('content');

    if (welcome) welcome.classList.add('hidden');
    if (content) content.classList.remove('hidden');

    startExperience();
    playMusic();
}

function startExperience() {
    if (started) return;
    started = true;
}

function playMusic() {
    if (isMuted) return;

    const audio = document.getElementById('music');
    if (audio) {
        audio.play().catch(() => {});
    }
}

function toggleMute() {
    isMuted = !isMuted;

    const audio = document.getElementById('music');
    const icon = document.getElementById('mute-icon');

    if (audio) {
        if (isMuted) {
            audio.pause();
        } else {
            audio.play().catch(() => {});
        }
    }

    if (icon) {
        icon.setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
        lucide.createIcons();
    }
}

window.onload = () => {
    lucide.createIcons();
};
</script>

</body>
</html>
